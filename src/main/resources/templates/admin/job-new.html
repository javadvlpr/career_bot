<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Vacancy - Career Bot Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<nav class="navbar">
    <h2>Career Bot Admin</h2>
    <div class="nav-links">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/companies">Companies</a>
        <a href="/admin/jobs" class="active">Vacancies</a>
        <a href="/admin/applications">Applicants</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/categories">Categories</a>
        <a href="/admin/skills">Skills</a>
        <a href="/admin/professions">Professions</a>
        <a href="/admin/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="table-card">
        <div class="table-header">
            <h3>➕ Add New Vacancy</h3>
        </div>

        <form action="/admin/jobs/create" method="post" style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label>Vacancy Title *</label>
                <input type="text" name="title" required placeholder="Java Backend Developer"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
            </div>

            <div>
                <label>Description</label>
                <textarea name="description" rows="4" placeholder="Detailed information about the vacancy"
                          style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>

            <div>
                <label>Requirements</label>
                <textarea name="requirements" rows="3" placeholder="Java 17, Spring Boot, PostgreSQL"
                          style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>

            <div>
                <label>Profession</label>
                <select name="professionId"
                        style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">-- Not selected --</option>
                    <option th:each="p : ${professions}" th:value="${p.id}"
                            th:text="${p.name + ' (' + (p.category != null ? p.category.name : '-') + ')'}"></option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Location</label>
                    <select name="location"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">-- Not selected --</option>
                        <option th:each="loc : ${locations}" th:value="${loc.name}" th:text="${loc.name}"></option>
                    </select>
                </div>

                <div style="flex: 1;">
                    <label>Job Type</label>
                    <select name="jobType"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">-- Not selected --</option>
                        <option value="FULL_TIME">Full-time</option>
                        <option value="PART_TIME">Part-time</option>
                        <option value="REMOTE">Remote</option>
                        <option value="FREELANCE">Freelance</option>
                        <option value="INTERNSHIP">Internship</option>
                    </select>
                </div>

                <div style="flex: 1;">
                    <label>Experience</label>
                    <select name="experienceLevel"
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">-- Not selected --</option>
                        <option value="NO_EXPERIENCE">0-1 year</option>
                        <option value="JUNIOR">1-3 years</option>
                        <option value="MIDDLE">3-5 years</option>
                        <option value="SENIOR">5+ years</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Min Salary (UZS)</label>
                    <input type="number" name="salaryMin" min="0" placeholder="5000000"
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>

                <div style="flex: 1;">
                    <label>Max Salary (UZS)</label>
                    <input type="number" name="salaryMax" min="0" placeholder="8000000"
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>

            <div style="border-top: 2px solid #eee; padding-top: 15px;">
                <p style="color: #666; margin-bottom: 10px;">
                    ⚠️ At least one of the following must be filled in:
                </p>

                <div>
                    <label>External URL (job listing link)</label>
                    <input type="url" name="externalUrl" placeholder="https://example.com/job/123"
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>

                <div style="margin-top: 10px;">
                    <label>Contact Info (phone, email, telegram)</label>
                    <input type="text" name="contactInfo" placeholder="+998901234567 or @username or email"
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" class="btn btn-approve" style="padding: 12px 30px;">
                    ✅ Save
                </button>
                <a href="/admin/jobs" class="btn" style="padding: 12px 30px; background: #6c757d; color: white;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
